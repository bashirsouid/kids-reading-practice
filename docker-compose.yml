services:
  comic-generator:
    build: .
    ports:
      - "7860:7860"
    # AMD GPU passthrough (ROCm)
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    volumes:
      # Persistent HuggingFace model cache
      - hf-cache:/root/.cache/huggingface
      # Output directory for exported comics
      - ./output:/app/output
      # Persistent logs for debugging crashes
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    # Required for ROCm GPU memory access
    ipc: host
    security_opt:
      - seccomp=unconfined
    # Restart on crash
    restart: unless-stopped

volumes:
  hf-cache:
