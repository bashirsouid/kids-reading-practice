services:
  comic-generator:
    build: .
    ports:
      - "7860:7860"
    volumes:
      # Output directory for exported comics
      - ./output:/app/output
      # Persistent logs for debugging
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    restart: unless-stopped
